services:
  - type: web
    name: marine-plastic-simulation-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: ALLOWED_HOSTS
        value: marine-plastic-simulation-api.onrender.com,*.onrender.com
