services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    build: ./frontend
    command: sh -c "npm ci && npm start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_WS_URL=ws://localhost:8000/ws/simulation
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
